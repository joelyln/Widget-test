<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Chaîne d'approvisionnement automatisée</title>
  <link rel="preload" href="background-forest.webp" as="image">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #d0d0d0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ── Widget 584×430 ─────────────────────────────────────── */
    .widget {
      width: 584px;
      height: 384px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background-image: url('background-forest.webp');
      background-size: cover;
      background-position: center;
    }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      position: absolute;
      top: 32px;
      left: 32px;
      width: 295px;
      background: #F9FBFA;
      border: 1px solid #CFD1D2;
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #031F18;
      line-height: 1.35;
      margin-bottom: 2px;
    }

    /* ── Supplier row ───────────────────────────────────────── */
    .supplier-row {
      background: #F5F5F5;
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .flag {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
    }

    .flag svg {
      width: 100%;
      height: 100%;
    }

    .supplier-info { flex: 1; min-width: 0; }

    .supplier-name {
      font-size: 15px;
      font-weight: 700;
      color: #031F18;
    }

    .supplier-country {
      font-size: 12px;
      color: #393D3F;
      margin-top: 2px;
    }

    .verify-btn {
      flex-shrink: 0;
      background: #E6F6EA;
      border: 1px solid rgba(38,165,81,0.5);
      border-radius: 6px;
      color: #26A551;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .verify-btn:hover { background: #cff0d8; }

    /* ── Skeleton ───────────────────────────────────────────── */
    .supplier-row.skeleton .supplier-info {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .skeleton-bar {
      height: 11px;
      background: #E0E0E0;
      border-radius: 6px;
      will-change: opacity;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .skeleton-bar.wide   { width: 72%; }
    .skeleton-bar.narrow { width: 52%; }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="card">
      <h2 class="card-title">Chaîne d'approvisionnement automatisée</h2>

      <!-- Fournisseur A – Brésil -->
      <div class="supplier-row">

            </g>
            <defs><clipPath id="clip-br"><rect width="24" height="24" fill="white"/></clipPath></defs>
          </svg>
        </div>
        <div class="supplier-info">
          <div class="supplier-name">Fournisseur A</div>
          <div class="supplier-country">Brésil</div>
        </div>
        <button class="verify-btn">Vérifier</button>
      </div>

      <!-- Fournisseur B – Indonésie -->
      <div class="supplier-row">
        <div class="flag" role="img" aria-label="Indonésie">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip-id)">
              <path d="M12 24C18.6274 24 24 18.6274 24 12C24 5.37258 18.6274 0 12 0C5.37258 0 0 5.37258 0 12C0 18.6274 5.37258 24 12 24Z" fill="#F0F0F0"/>
              <path d="M0 12C0 5.37262 5.37262 0 12 0C18.6274 0 24 5.37262 24 12" fill="#A2001D"/>
            </g>
            <defs><clipPath id="clip-id"><rect width="24" height="24" fill="white"/></clipPath></defs>
          </svg>
        </div>
        <div class="supplier-info">
          <div class="supplier-name">Fournisseur B</div>
          <div class="supplier-country">Indonésie</div>
        </div>
        <button class="verify-btn">Vérifier</button>
      </div>

      <!-- Skeleton – Niger -->
      <div class="supplier-row skeleton">
        <div class="flag" role="img" aria-label="Niger">

            </g>
            <defs><clipPath id="clip-ne"><rect width="24" height="24" fill="white"/></clipPath></defs>
          </svg>
        </div>
        <div class="supplier-info">
          <div class="skeleton-bar wide"></div>
          <div class="skeleton-bar narrow"></div>
        </div>
      </div>

      <!-- Skeleton – Malaisie -->
      <div class="supplier-row skeleton">
        <div class="flag" role="img" aria-label="Malaisie">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip-my)">
              <path d="M12 24C18.6274 24 24 18.6274 24 12C24 5.37258 18.6274 0 12 0C5.37258 0 0 5.37258 0 12C0 18.6274 5.37258 24 12 24Z" fill="#F0F0F0"/>
              <path d="M11.4785 12.0006H24.0002C24.0002 10.9174 23.8559 9.86827 23.5868 8.87012H11.4785V12.0006Z" fill="#D80027"/>
              <path d="M11.4785 5.73885H22.239C21.5044 4.54016 20.5652 3.48065 19.4701 2.6084H11.4785V5.73885Z" fill="#D80027"/>

              <path d="M1.76195 18.2603H22.2394C22.8291 17.2981 23.2864 16.2462 23.5873 15.1299H0.414062C0.714859 16.2462 1.17222 17.2981 1.76195 18.2603Z" fill="#D80027"/>

              <path d="M8.81842 5.21777L9.34525 6.31943L10.535 6.04455L10.0022 7.14326L10.959 7.90202L9.76773 8.17057L9.77106 9.39171L8.81842 8.62774L7.86573 9.39171L7.86902 8.17057L6.67773 7.90202L7.63455 7.14326L7.10172 6.04455L8.29155 6.31943L8.81842 5.21777Z" fill="#FFDA44"/>

            <defs><clipPath id="clip-my"><rect width="24" height="24" fill="white"/></clipPath></defs>
          </svg>
        </div>
        <div class="supplier-info">
          <div class="skeleton-bar wide"></div>
          <div class="skeleton-bar narrow"></div>
        </div>
      </div>

    </div><!-- /card -->
  </div><!-- /widget -->
</body>
</html>
